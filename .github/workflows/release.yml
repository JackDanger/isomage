name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------
  # `isomage` is a library-only crate. Releases consist of:
  #
  #   1. A GitHub Release with auto-generated notes (so the tag has a
  #      page on github.com with a link target for CHANGELOG, badges,
  #      and back-references from any user-facing release notes).
  #   2. A `cargo publish` to crates.io.
  #
  # There are intentionally no platform binaries, no Homebrew formula,
  # no install.sh, no SBOM, no docker image. If you need an `isomage`
  # CLI on $PATH, see README.md § "If you want a CLI…" for a 50-line
  # wrapper using the public API.
  # ---------------------------------------------------------------------
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/JackDanger/isomage/blob/main/CHANGELOG.md)
            for the curated, human-readable change list.

            **Install:**
            ```toml
            [dependencies]
            isomage = "${{ github.ref_name }}"
            ```
            (Strip the leading `v` from the tag.)

  publish-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish
      - name: Verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          ver=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag $GITHUB_REF_NAME doesn't match Cargo.toml version $ver" >&2
            exit 1
          fi
          echo "✓ tag $GITHUB_REF_NAME matches Cargo.toml version $ver"
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
