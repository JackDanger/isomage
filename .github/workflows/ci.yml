name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install ISO tools (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y genisoimage
      - name: Generate test data
        run: make test-data
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test

  prompt-log:
    name: Prompt log check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for prompt log entry
        env:
          # Pass SHAs from the PR event payload — SHAs are always present
          # in the local repo after fetch-depth: 0, while remote-tracking
          # refs may not be set up the way we expect.
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          chmod +x scripts/check_promptlog.sh
          scripts/check_promptlog.sh "$BASE_SHA" "$HEAD_SHA"
