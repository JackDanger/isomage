name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install ISO tools (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y genisoimage
      - name: Generate test data
        run: make test-data
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test

  prompt-log:
    name: Prompt log check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for prompt log entry
        run: |
          chmod +x scripts/check_promptlog.sh
          scripts/check_promptlog.sh "origin/${{ github.base_ref }}" "HEAD"
