name: Feature request
description: Suggest a change to isomage. Read the "What's out of scope" section in CONTRIBUTING.md first.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before you submit: see
        [`CONTRIBUTING.md`](https://github.com/JackDanger/isomage/blob/main/CONTRIBUTING.md)
        for what's in and out of scope. ISO writing and FUSE
        integration are *out* of scope by design; everything else is
        worth proposing.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the use case. A good feature request leads with a
        concrete situation, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have one in mind, sketch it here.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one is better.
    validations:
      required: false
