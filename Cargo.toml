[package]
name = "isomage"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Jack Danger <github@jackdanger.com>"]

[[bin]]
name = "isomage"
path = "src/main.rs"

[lib]
name = "isomage"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }

[profile.release]
opt-level = 2
lto = true
codegen-units = 1
