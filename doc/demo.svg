<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420">
  <style>
    @keyframes blink { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
    @keyframes t1 { 0%,4% { opacity: 0 } 5% { opacity: 1 } }
    @keyframes t2 { 0%,14% { opacity: 0 } 15% { opacity: 1 } }
    @keyframes t3 { 0%,29% { opacity: 0 } 30% { opacity: 1 } }
    @keyframes t4 { 0%,44% { opacity: 0 } 45% { opacity: 1 } }
    @keyframes t5 { 0%,59% { opacity: 0 } 60% { opacity: 1 } }
    @keyframes cursor1 { 0%,4% { opacity: 1 } 5%,100% { opacity: 0 } }
    @keyframes cursor2 { 0%,14% { opacity: 0 } 15%,29% { opacity: 1 } 30%,100% { opacity: 0 } }
    @keyframes cursor3 { 0%,44% { opacity: 0 } 45%,59% { opacity: 1 } 60%,100% { opacity: 0 } }
    @keyframes disc { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
    @keyframes float { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-4px) } }
    @keyframes sparkle { 0%,100% { opacity: 0 } 50% { opacity: 1 } }
    .term { fill: #1a1b26; }
    .bar { fill: #24283b; }
    .btn-r { fill: #f7768e; }
    .btn-y { fill: #e0af68; }
    .btn-g { fill: #9ece6a; }
    .prompt { fill: #7aa2f7; font-family: 'SF Mono',Monaco,'Cascadia Code',monospace; font-size: 13px; }
    .cmd { fill: #c0caf5; font-family: 'SF Mono',Monaco,'Cascadia Code',monospace; font-size: 13px; }
    .dir { fill: #7aa2f7; font-family: 'SF Mono',Monaco,'Cascadia Code',monospace; font-size: 13px; }
    .file { fill: #a9b1d6; font-family: 'SF Mono',Monaco,'Cascadia Code',monospace; font-size: 13px; }
    .size { fill: #565f89; font-family: 'SF Mono',Monaco,'Cascadia Code',monospace; font-size: 13px; }
    .out { fill: #9ece6a; font-family: 'SF Mono',Monaco,'Cascadia Code',monospace; font-size: 13px; }
    .cursor { fill: #c0caf5; animation: blink 1s infinite; }
    .title { fill: #565f89; font-family: 'SF Mono',Monaco,'Cascadia Code',monospace; font-size: 12px; }
  </style>
  <!-- window -->
  <rect class="term" width="640" height="420" rx="10"/>
  <rect class="bar" width="640" height="36" rx="10 10 0 0"/>
  <circle class="btn-r" cx="20" cy="18" r="6"/>
  <circle class="btn-y" cx="40" cy="18" r="6"/>
  <circle class="btn-g" cx="60" cy="18" r="6"/>
  <text class="title" x="290" y="22" text-anchor="middle">isomage</text>

  <!-- spinning disc mascot -->
  <g transform="translate(575, 80)" style="animation: float 3s ease-in-out infinite">
    <g style="animation: disc 4s linear infinite; transform-origin: 0 0">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#7aa2f7" stroke-width="2" opacity="0.4"/>
      <circle cx="0" cy="0" r="15" fill="none" stroke="#7aa2f7" stroke-width="1.5" opacity="0.3"/>
      <circle cx="0" cy="0" r="4" fill="#7aa2f7" opacity="0.6"/>
      <circle cx="0" cy="0" r="8" fill="none" stroke="#7aa2f7" stroke-width="0.5" opacity="0.3"/>
      <path d="M-20,5 A20,20 0 0,1 5,-20" fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.5"/>
      <path d="M20,-5 A20,20 0 0,1 -5,20" fill="none" stroke="#e0af68" stroke-width="1.5" opacity="0.5"/>
    </g>
    <!-- sparkles -->
    <circle cx="-30" cy="-10" r="1.5" fill="#e0af68" style="animation: sparkle 2s 0.3s infinite"/>
    <circle cx="28" cy="15" r="1" fill="#9ece6a" style="animation: sparkle 2s 0.8s infinite"/>
    <circle cx="-15" cy="28" r="1.5" fill="#f7768e" style="animation: sparkle 2s 1.4s infinite"/>
  </g>

  <!-- line 1: prompt + command (list) -->
  <g style="animation: t1 20s infinite">
    <text class="prompt" x="16" y="64">$</text>
    <text class="cmd" x="30" y="64">isomage movie.iso</text>
  </g>
  <rect class="cursor" x="196" y="52" width="8" height="16" style="animation: cursor1 20s infinite"/>

  <!-- line 2-9: tree output -->
  <g style="animation: t2 20s infinite">
    <text class="dir"  x="16" y="84">d /</text><text class="size" x="60" y="84">(24.8 GB)</text>
    <text class="dir"  x="32" y="102">d BDMV</text><text class="size" x="110" y="102">(24.8 GB)</text>
    <text class="dir"  x="48" y="120">d STREAM</text><text class="size" x="140" y="120">(24.7 GB)</text>
    <text class="file" x="64" y="138">- 00000.m2ts</text><text class="size" x="190" y="138">(20.1 GB)</text>
    <text class="file" x="64" y="156">- 00001.m2ts</text><text class="size" x="190" y="156">(4.6 GB)</text>
    <text class="dir"  x="48" y="174">d CLIPINF</text><text class="size" x="146" y="174">(1.2 KB)</text>
    <text class="dir"  x="48" y="192">d PLAYLIST</text><text class="size" x="155" y="192">(408 B)</text>
    <text class="file" x="32" y="210">- CERTIFICATE</text><text class="size" x="170" y="210">(3.1 KB)</text>
  </g>

  <!-- line 10: prompt + cat command -->
  <g style="animation: t3 20s infinite">
    <text class="prompt" x="16" y="244">$</text>
    <text class="cmd" x="30" y="244">isomage -c BDMV/PLAYLIST/00000.mpls movie.iso | hexdump -C | head</text>
  </g>
  <rect class="cursor" x="544" y="232" width="8" height="16" style="animation: cursor2 20s infinite"/>

  <!-- hex output -->
  <g style="animation: t4 20s infinite">
    <text class="file" x="16" y="264">00000000  4d 50 4c 53 30 32 30 30  00 00 00 ea 00 00 00</text>
    <text class="file" x="16" y="282">00000010  00 00 01 1a 00 00 00 00  00 01 00 00 00 01 00</text>
  </g>

  <!-- line: prompt + extract command -->
  <g style="animation: t5 20s infinite">
    <text class="prompt" x="16" y="316">$</text>
    <text class="cmd" x="30" y="316">isomage -x BDMV/STREAM/00001.m2ts -o ./extras movie.iso</text>
    <text class="out" x="16" y="338">Extracted: ./extras/00001.m2ts</text>
    <text class="out" x="16" y="356">Extraction completed successfully.</text>
  </g>
  <rect class="cursor" x="30" y="366" width="8" height="16" style="animation: cursor3 20s infinite"/>
</svg>
